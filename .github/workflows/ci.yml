name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6

      - name: Validate RDF ontology and instances
        run: |
          nix-shell -p python3Packages.rdflib --run 'python3 ontology/validate.py'
