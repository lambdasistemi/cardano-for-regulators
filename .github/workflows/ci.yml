name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - name: Clean workspace
        run: chmod -R u+w . 2>/dev/null || true

      - uses: actions/checkout@v6

      - name: Validate RDF ontology
        run: nix build .#checks.x86_64-linux.ontology
