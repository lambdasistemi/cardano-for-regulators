site_name: Cardano for Regulators
site_description: Framework for analyzing multi-party regulations and mapping them to Cardano compliance infrastructure
site_url: https://lambdasistemi.github.io/cardano-for-regulators/
repo_url: https://github.com/lambdasistemi/cardano-for-regulators
repo_name: lambdasistemi/cardano-for-regulators

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - content.tabs.link

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid.mjs

plugins:
  - search

nav:
  - Home: index.md
  - Framework:
      - The Regulator Schema: framework/schema.md
      - The Five Constraints: framework/constraints.md
      - Analysis Methodology: framework/methodology.md
      - Architecture Patterns: framework/patterns.md
  - Case Studies:
      - EU Battery Regulation: cases/battery-regulation.md
